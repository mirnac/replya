spring.application.name=replya
whatsapp.api.verify-token=${WHATSAPP_VERIFY_TOKEN:replya-verify-123}
whatsapp.api.access-token=${WHATSAPP_ACCESS_TOKEN}
whatsapp.api.graph-base-url=https://graph.facebook.com
whatsapp.api.graph-api-version=v25.0

# --- Datasource (PostgreSQL) ---
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME:replya}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:replya}

# --- JPA / Hibernate ---
# Flyway owns the schema; Hibernate only validates entities against it (never create/update).
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# --- Flyway ---
# Migrations live in src/main/resources/db/migration as V<n>__<description>.sql
spring.flyway.enabled=true

anthropic.api-key=${ANTHROPIC_API_KEY}
anthropic.base-url=https://api.anthropic.com
anthropic.version=2023-06-01
anthropic.model=claude-haiku-4-5-20251001
anthropic.max-tokens=1024

replya.history-size=10